<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subnet Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14171C;
    --panel: #1B1F27;
    --panel-raised: #20252F;
    --line: #2B313D;
    --teal: #3FA796;
    --amber: #E8A33D;
    --text: #E7E3DA;
    --muted: #7C8494;
    --danger: #D9705C;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family:'Vazirmatn','Space Grotesk',sans-serif;
    min-height:100vh;
  }
  .mono{font-family:'JetBrains Mono', monospace;}
  .wrap{
    max-width:1100px;
    margin:0 auto;
    padding:40px 24px 80px;
  }
  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:1px solid var(--line);
    padding-bottom:20px;
    margin-bottom:32px;
    flex-wrap:wrap;
    gap:12px;
  }
  header h1{
    font-family:'Space Grotesk', sans-serif;
    font-size:26px;
    font-weight:700;
    margin:0;
    letter-spacing:-0.02em;
  }
  header .tag{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--muted);
    letter-spacing:0.05em;
  }
  .grid{
    display:grid;
    grid-template-columns: 340px 1fr;
    gap:24px;
  }
  @media (max-width:820px){ .grid{grid-template-columns:1fr;} }

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:24px;
  }
  .panel h2{
    font-family:'Space Grotesk',sans-serif;
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
    margin:0 0 20px;
    font-weight:600;
  }
  label{
    display:block;
    font-size:13px;
    color:var(--muted);
    margin-bottom:6px;
  }
  .field{ margin-bottom:18px; }
  input{
    width:100%;
    background:var(--panel-raised);
    border:1px solid var(--line);
    border-radius:6px;
    padding:11px 12px;
    color:var(--text);
    font-family:'JetBrains Mono', monospace;
    font-size:15px;
    transition: border-color .15s ease;
  }
  input:focus{
    outline:none;
    border-color:var(--teal);
  }
  input.err{ border-color:var(--danger); }
  .errtext{
    color:var(--danger);
    font-size:12px;
    margin-top:6px;
    font-family:'JetBrains Mono', monospace;
    min-height:16px;
  }
  button{
    width:100%;
    background:var(--teal);
    color:#0E1512;
    border:none;
    border-radius:6px;
    padding:13px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    letter-spacing:0.01em;
    transition: transform .1s ease, background .15s ease;
  }
  button:hover{ background:#4fc0ad; }
  button:active{ transform: scale(0.98); }

  .stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:1px;
    background:var(--line);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
    margin-bottom:24px;
  }
  @media (max-width:600px){ .stats{grid-template-columns:repeat(2,1fr);} }
  .stat{
    background:var(--panel);
    padding:16px 14px;
  }
  .stat .num{
    font-family:'JetBrains Mono', monospace;
    font-size:22px;
    font-weight:600;
    color:var(--amber);
  }
  .stat .lbl{
    font-size:11px;
    color:var(--muted);
    margin-top:4px;
    letter-spacing:0.03em;
  }

  /* Signature element: address space bar */
  .space-bar-wrap{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:24px;
    margin-bottom:24px;
  }
  .space-bar-wrap h2{
    font-family:'Space Grotesk',sans-serif;
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
    margin:0 0 4px;
    font-weight:600;
  }
  .space-bar-sub{
    font-size:12px;
    color:var(--muted);
    margin-bottom:18px;
    font-family:'JetBrains Mono',monospace;
  }
  .space-bar{
    display:flex;
    height:56px;
    border-radius:6px;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .block{
    position:relative;
    border-right:1px solid rgba(0,0,0,0.35);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    font-weight:600;
    color:#0E1512;
    cursor:default;
    transition: filter .12s ease;
  }
  .block:last-child{ border-right:none; }
  .block:hover{ filter:brightness(1.15); }
  .block .n{ opacity:0.85; }
  .bar-scale{
    display:flex;
    justify-content:space-between;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--muted);
    margin-top:8px;
  }

  table{
    width:100%;
    border-collapse:collapse;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
  }
  thead th{
    text-align:right;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--muted);
    font-weight:600;
    padding:12px 14px;
    border-bottom:1px solid var(--line);
    background:var(--panel-raised);
  }
  tbody td{
    padding:12px 14px;
    font-family:'JetBrains Mono', monospace;
    font-size:13.5px;
    border-bottom:1px solid var(--line);
  }
  tbody tr:last-child td{ border-bottom:none; }
  tbody tr:hover{ background:var(--panel-raised); }
  .swatch{
    display:inline-block;
    width:10px;height:10px;
    border-radius:2px;
    margin-left:8px;
    vertical-align:middle;
  }
  .empty{
    text-align:center;
    color:var(--muted);
    padding:60px 20px;
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    border:1px dashed var(--line);
    border-radius:10px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Subnet Calculator</h1>
    <span class="tag">IPv4 &middot; CIDR &middot; VLSM</span>
  </header>

  <div class="grid">
    <div class="panel">
      <h2>ورودی‌ها</h2>
      <div class="field">
        <label>آدرس شبکه پایه</label>
        <input id="ip" class="mono" value="192.168.10.0" placeholder="192.168.10.0">
        <div class="errtext" id="err-ip"></div>
      </div>
      <div class="field">
        <label>پرفیکس اصلی (CIDR)</label>
        <input id="prefix" class="mono" value="24" placeholder="24">
        <div class="errtext" id="err-prefix"></div>
      </div>
      <div class="field">
        <label>تعداد زیرشبکه مورد نیاز</label>
        <input id="count" class="mono" value="4" placeholder="4">
        <div class="errtext" id="err-count"></div>
      </div>
      <button onclick="calculate()">محاسبه کن</button>
    </div>

    <div id="results">
      <div class="empty">مقادیر را وارد کن و «محاسبه کن» را بزن.</div>
    </div>
  </div>
</div>

<script>
const palette = ['#3FA796','#E8A33D','#7C9CD9','#D9705C','#B98CD9','#5FBF7A','#E8C93D','#5B95A6'];

function ipToParts(ip){
  return ip.trim().split('.').map(p => parseInt(p,10));
}

function validate(){
  const ipEl = document.getElementById('ip');
  const prefixEl = document.getElementById('prefix');
  const countEl = document.getElementById('count');
  ['err-ip','err-prefix','err-count'].forEach(id=>document.getElementById(id).textContent='');
  [ipEl,prefixEl,countEl].forEach(e=>e.classList.remove('err'));

  let ok = true;
  const parts = ipToParts(ipEl.value);
  if(parts.length!==4 || parts.some(p=>isNaN(p)||p<0||p>255)){
    document.getElementById('err-ip').textContent = 'آدرس IP معتبر نیست (مثال: 192.168.10.0)';
    ipEl.classList.add('err'); ok=false;
  }
  const prefix = parseInt(prefixEl.value,10);
  if(isNaN(prefix) || prefix<1 || prefix>30){
    document.getElementById('err-prefix').textContent = 'پرفیکس باید بین 1 تا 30 باشد';
    prefixEl.classList.add('err'); ok=false;
  }
  const count = parseInt(countEl.value,10);
  if(isNaN(count) || count<2){
    document.getElementById('err-count').textContent = 'حداقل به 2 زیرشبکه نیاز است';
    countEl.classList.add('err'); ok=false;
  }
  if(ok){
    const bitsNeeded = Math.ceil(Math.log2(count));
    const newPrefix = prefix + bitsNeeded;
    if(newPrefix > 30){
      document.getElementById('err-count').textContent = 'تعداد زیرشبکه با این پرفیکس اصلی خیلی زیاده (فضای هاست کافی نیست)';
      countEl.classList.add('err'); ok=false;
    }
  }
  return ok ? {parts, prefix, count} : null;
}

function calculate(){
  const v = validate();
  if(!v) return;
  const {parts, prefix, count} = v;

  const lastOctet = parts[3];
  const ipPrefixStr = parts.slice(0,3).join('.');
  const bitsNeeded = Math.ceil(Math.log2(count));
  const newPrefix = prefix + bitsNeeded;
  const hostBits = 32 - newPrefix;
  const addressesPerSubnet = Math.pow(2, hostBits);
  const usableHosts = addressesPerSubnet - 2;

  const subnets = [];
  for(let i=0;i<count;i++){
    const networkStart = lastOctet + i*addressesPerSubnet;
    const broadcast = networkStart + addressesPerSubnet - 1;
    subnets.push({
      index:i+1,
      network:`${ipPrefixStr}.${networkStart}`,
      broadcast:`${ipPrefixStr}.${broadcast}`,
      firstUsable:`${ipPrefixStr}.${networkStart+1}`,
      lastUsable:`${ipPrefixStr}.${broadcast-1}`,
      networkStart, broadcast
    });
  }

  renderResults({prefix,count,bitsNeeded,newPrefix,hostBits,addressesPerSubnet,usableHosts,subnets,ipPrefixStr,lastOctet});
}

function renderResults(d){
  const total = 256;
  const barBlocks = d.subnets.map((s,i)=>{
    const startPct = ((s.networkStart)/total)*100;
    const widthPct = (d.addressesPerSubnet/total)*100;
    return `<div class="block" style="width:${widthPct}%; background:${palette[i%palette.length]}" title="Subnet ${s.index}: ${s.network} - ${s.broadcast}">
      <span class="n">${s.networkStart}</span>
    </div>`;
  }).join('');

  const rows = d.subnets.map((s,i)=>`
    <tr>
      <td><span class="swatch" style="background:${palette[i%palette.length]}"></span>${s.index}</td>
      <td>${s.network}/${d.newPrefix}</td>
      <td>${s.firstUsable} &ndash; ${s.lastUsable}</td>
      <td>${s.broadcast}</td>
    </tr>
  `).join('');

  document.getElementById('results').innerHTML = `
    <div class="stats">
      <div class="stat"><div class="num">${d.newPrefix}</div><div class="lbl">پرفیکس جدید (/${d.newPrefix})</div></div>
      <div class="stat"><div class="num">${d.hostBits}</div><div class="lbl">بیت هاست</div></div>
      <div class="stat"><div class="num">${d.addressesPerSubnet}</div><div class="lbl">آدرس هر زیرشبکه</div></div>
      <div class="stat"><div class="num">${d.usableHosts}</div><div class="lbl">هاست قابل استفاده</div></div>
    </div>

    <div class="space-bar-wrap">
      <h2>نقشه فضای آدرس</h2>
      <div class="space-bar-sub">${d.ipPrefixStr}.0 &nbsp;&rarr;&nbsp; ${d.ipPrefixStr}.255 &middot; تقسیم به ${d.count} بلوک مساوی</div>
      <div class="space-bar">${barBlocks}</div>
      <div class="bar-scale"><span>0</span><span>128</span><span>255</span></div>
    </div>

    <table>
      <thead>
        <tr><th>#</th><th>Network</th><th>محدوده قابل استفاده</th><th>Broadcast</th></tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}
</script>
</body>
</html>
